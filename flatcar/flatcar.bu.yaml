variant: flatcar
version: 1.0.0

passwd:
  users:
    - name: idan
      groups: [sudo, docker]
      shell: /bin/bash
      ssh_authorized_keys:
        - "${SSH_AUTHORIZED_KEY}"

storage:
  disks:
    - device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_flatcar-state
      wipe_table: false
      partitions:
        - number: 1
          label: state
          size_mib: 0

    - device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_flatcar-fast
      wipe_table: false
      partitions:
        - number: 1
          label: fast
          size_mib: 0

    - device: /dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_flatcar-slow
      wipe_table: false
      partitions:
        - number: 1
          label: slow
          size_mib: 0

  filesystems:
    - path: /srv
      device: /dev/disk/by-partlabel/state
      format: ext4
      with_mount_unit: true

    - path: /mnt/fast
      device: /dev/disk/by-partlabel/fast
      format: ext4
      with_mount_unit: true

    - path: /mnt/slow
      device: /dev/disk/by-partlabel/slow
      format: ext4
      with_mount_unit: true

  directories:
    - path: /srv/stacks
      mode: 0755

    - path: /srv/stacks/arcane
      mode: 0755

    - path: /mnt/fast/docker
      mode: 0711

    - path: /srv/sops
      mode: 0700

    - path: /opt/bin
      mode: 0755

  files:
    - path: /opt/ignition-version
      mode: 0644
      contents:
        inline: "22"

    - path: /srv/stacks/arcane/compose.yaml
      overwrite: true
      mode: 0644
      contents:
        inline: |
          services:
            arcane:
              image: ghcr.io/getarcaneapp/arcane:latest
              container_name: arcane
              ports:
                - '10000:3552'
              volumes:
                - /var/run/docker.sock:/var/run/docker.sock
                - arcane_data:/app/data
                - /srv/stacks:/srv/stacks
              environment:
                - APP_URL=http://localhost:3552
                - PROJECTS_DIRECTORY=/srv/stacks
                - PUID=1000
                - PGID=1000
              env_file:
                - .env
              restart: unless-stopped
          volumes:
            arcane_data:

    - path: /srv/stacks/arcane/.sops.env
      overwrite: true
      mode: 0600
      contents:
        local: .sops.env


systemd:
  units:
    - name: silence-kernel-console.service
      enabled: true
      contents: |
        [Unit]
        Description=Silence kernel messages on console
        After=multi-user.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/dmesg -n 1

        [Install]
        WantedBy=multi-user.target

    - name: set-timezone.service
      enabled: true
      contents: |
        [Unit]
        Description=Set timezone to America/Chicago
        Before=multi-user.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/ln -snf /usr/share/zoneinfo/America/Chicago /etc/localtime

        [Install]
        WantedBy=multi-user.target

    # Move docker stuff to fast (volumes/images/etc)
    - name: var-lib-docker.mount
      enabled: true
      contents: |
        [Unit]
        Description=Bind mount Docker data to fast storage
        Requires=mnt-fast.mount
        After=mnt-fast.mount

        [Mount]
        What=/mnt/fast/docker
        Where=/var/lib/docker
        Type=none
        Options=bind

        [Install]
        WantedBy=multi-user.target

    - name: docker.service
      enabled: true
      dropins:
        - name: 10-wait-docker-root.conf
          contents: |
            [Unit]
            Requires=var-lib-docker.mount
            After=var-lib-docker.mount

    - name: install-docker-compose.service
      enabled: true
      contents: |
        [Unit]
        Description=Install Docker Compose
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=!/opt/bin/docker-compose

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/curl -fsSL -o /opt/bin/docker-compose \
          "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64"
        ExecStartPost=/usr/bin/chmod +x /opt/bin/docker-compose

        [Install]
        WantedBy=multi-user.target

    - name: install-tailscale.service
      enabled: true
      contents: |
        [Unit]
        Description=Install Tailscale
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=!/opt/bin/tailscale

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/bash -c '\
          curl -fsSL "https://pkgs.tailscale.com/stable/tailscale_latest_amd64.tgz" | tar -xzf - -C /tmp && \
          cp /tmp/tailscale_*_amd64/tailscale /tmp/tailscale_*_amd64/tailscaled /opt/bin/ \
        '

        [Install]
        WantedBy=multi-user.target

    - name: tailscaled.service
      enabled: true
      contents: |
        [Unit]
        Description=Tailscale Daemon
        Wants=network-online.target
        After=network-online.target install-tailscale.service
        Requires=install-tailscale.service

        [Service]
        ExecStart=/opt/bin/tailscaled --state=/var/lib/tailscale/tailscaled.state --socket=/run/tailscale/tailscaled.sock
        Restart=on-failure
        RuntimeDirectory=tailscale
        StateDirectory=tailscale

        [Install]
        WantedBy=multi-user.target

    - name: tailscale-up.service
      enabled: true
      contents: |
        [Unit]
        Description=Tailscale Login
        After=tailscaled.service
        Requires=tailscaled.service

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/bin/tailscale up --authkey=${TAILSCALE_AUTH_KEY} --accept-routes

        [Install]
        WantedBy=multi-user.target

    - name: install-sops.service
      enabled: true
      contents: |
        [Unit]
        Description=Install SOPS
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=!/opt/bin/sops

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/usr/bin/curl -fsSL -o /opt/bin/sops \
          "https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64"
        ExecStartPost=/usr/bin/chmod +x /opt/bin/sops

        [Install]
        WantedBy=multi-user.target

    - name: write-age-key.service
      enabled: true
      contents: |
        [Unit]
        Description=Write age private key for SOPS decryption
        Requires=srv.mount
        After=srv.mount

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/bash -c 'mkdir -p /srv/sops && printf "%%s\n" "${SOPS_AGE_KEY}" > /srv/sops/age-key.txt'
        ExecStartPost=/bin/chmod 600 /srv/sops/age-key.txt

        [Install]
        WantedBy=multi-user.target

    - name: decrypt-sops-envs.service
      enabled: true
      contents: |
        [Unit]
        Description=Decrypt all .sops.env files to .env
        Requires=srv.mount install-sops.service write-age-key.service
        After=srv.mount install-sops.service write-age-key.service

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/bash -c 'for f in /srv/stacks/*/.sops.env; do [ -f "$f" ] && SOPS_AGE_KEY_FILE=/srv/sops/age-key.txt /opt/bin/sops -d "$f" > "$(dirname "$f")/.env"; done'

        [Install]
        WantedBy=multi-user.target

    - name: bootstrap-arcane.service
      enabled: true
      contents: |
        [Unit]
        Description=Bootstrap Arcane Docker Management
        Requires=docker.service srv.mount decrypt-sops-envs.service
        After=docker.service srv.mount install-docker-compose.service decrypt-sops-envs.service
        Wants=network-online.target
        After=network-online.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        WorkingDirectory=/srv/stacks/arcane
        ExecStart=/opt/bin/docker-compose up -d

        [Install]
        WantedBy=multi-user.target
