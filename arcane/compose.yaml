services:
  arcane:
    image: ghcr.io/getarcaneapp/arcane:1.17.4
    container_name: arcane
    ports:
      - '10000:3552'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - arcane_data:/app/data
      - /srv/stacks:/srv/stacks
    environment:
      - APP_URL=http://localhost:3552
      - PROJECTS_DIRECTORY=/srv/stacks
      - PUID=1000
      - PGID=1000
    env_file:
      - .env
    restart: unless-stopped

volumes:
  arcane_data:
