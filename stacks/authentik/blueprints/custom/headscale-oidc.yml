version: 1
metadata:
  name: headscale-oidc
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  # ===========================================
  # Group for Headscale users
  # ===========================================
  - model: authentik_core.group
    id: headscale-users-group
    state: present
    identifiers:
      name: headscale-users
    attrs:
      # Users in this group can authenticate to Headscale
      # Add users to this group via the users section below

  # ===========================================
  # OIDC Provider for Headscale
  # ===========================================
  - model: authentik_providers_oauth2.oauth2provider
    id: headscale-provider
    state: present
    identifiers:
      name: headscale
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: headscale
      client_secret: "${HEADSCALE_OIDC_CLIENT_SECRET}"
      redirect_uris:
        - url: "https://headscale.idanreed.com/oidc/callback"
          matching_mode: strict
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      # Token validity
      access_token_validity: hours=1
      refresh_token_validity: days=30

  # ===========================================
  # Application (ties provider to UI)
  # ===========================================
  - model: authentik_core.application
    id: headscale-app
    state: present
    identifiers:
      slug: headscale
    attrs:
      name: Headscale VPN
      provider: !KeyOf headscale-provider
      policy_engine_mode: any
      meta_icon: https://raw.githubusercontent.com/juanfont/headscale/main/docs/logo/headscale3_header_stacked_left.png
      meta_description: "Tailscale-compatible VPN coordination server"

  # ===========================================
  # MFA Stages (TOTP enforcement)
  # ===========================================

  # Stage to set up TOTP if not enrolled
  - model: authentik_stages_authenticator_totp.authenticatortotpstage
    id: totp-setup-stage
    state: present
    identifiers:
      name: headscale-totp-setup
    attrs:
      friendly_name: "Authenticator App Setup"
      digits: 6

  # Stage to validate TOTP at login
  - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
    id: mfa-validation-stage
    state: present
    identifiers:
      name: headscale-mfa-validation
    attrs:
      not_configured_action: "configure"  # Prompt to configure if not set up
      device_classes:
        - totp
      configuration_stages:
        - !KeyOf totp-setup-stage

  # ===========================================
  # Users
  # Add new users here and push to git
  # ===========================================
  - model: authentik_core.user
    id: user-idan
    state: present
    identifiers:
      username: idan
    attrs:
      name: Idan Reed
      email: idan@idanreed.com
      path: users
      is_active: true
      groups:
        - !Find [authentik_core.group, [name, headscale-users]]

  # Example: Add another user
  # - model: authentik_core.user
  #   state: present
  #   identifiers:
  #     username: alice
  #   attrs:
  #     name: Alice Smith
  #     email: alice@example.com
  #     path: users
  #     is_active: true
  #     groups:
  #       - !Find [authentik_core.group, [name, headscale-users]]
